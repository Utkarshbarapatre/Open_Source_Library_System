<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSLS — Open-Source Library System</title>
    <meta name="description" content="Buzzword Software Solutions open-source resource library. Sign in to access and share technical resources.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <h1>OSLS</h1>
            <p>Open-Source Library System &mdash; Buzzword Software Solutions</p>
        </div>

        <div class="card">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="form-login">
                <div class="error-msg" id="login-error"></div>
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" class="form-control" placeholder="Enter username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="Enter password" autocomplete="current-password">
                </div>
                <button class="btn btn-primary btn-full" id="btn-login" onclick="doLogin()">Sign In</button>
            </div>

            <!-- Register Form -->
            <div class="auth-form" id="form-register">
                <div class="error-msg" id="register-error"></div>
                <div class="success-msg" id="register-success"></div>
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-control" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="Enter email address" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Create a password" autocomplete="new-password">
                </div>
                <button class="btn btn-primary btn-full" id="btn-register" onclick="doRegister()">Create Account</button>
            </div>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
