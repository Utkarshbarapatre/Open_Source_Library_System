spring.application.name=OSLS

# MySQL DataSource
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:osls_db}?createDatabaseIfNotExist=true&useSSL=${DB_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:my-secret-pwd}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql against MySQL (not just embedded DBs), after Hibernate creates/updates the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=OSLSBuzzwordSecretKey2024SuperLongSecureSecretKeyForJWTSigning!@#
app.jwt.expiration-ms=900000
app.refresh.expiration-days=7

# Server
server.port=8080

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
