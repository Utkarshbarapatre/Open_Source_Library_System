spring.application.name=OSLS

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:osls_db}?sslmode=${DB_SSL_MODE:prefer}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql against PostgreSQL (not just embedded DBs), after Hibernate creates/updates the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=OSLSBuzzwordSecretKey2024SuperLongSecureSecretKeyForJWTSigning!@#
app.jwt.expiration-ms=900000
app.refresh.expiration-days=7

# Server
server.port=8080

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
