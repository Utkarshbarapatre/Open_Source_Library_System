spring.application.name=OSLS-Test

# H2 InMemory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Run sql initialization modes
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JWT properties
app.jwt.secret=OSLSBuzzwordSecretKey2024SuperLongSecureSecretKeyForJWTSigning!@#
app.jwt.expiration-ms=900000
app.refresh.expiration-days=7
